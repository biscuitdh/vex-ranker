#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - docker.io
  - docker-compose-v2
  - fail2ban
  - git
  - ufw

write_files:
  - path: /etc/sysctl.d/99-vex-ranker.conf
    owner: root:root
    permissions: "0644"
    content: |
      net.ipv4.ip_forward = 0
      net.ipv4.conf.all.accept_redirects = 0
      net.ipv4.conf.default.accept_redirects = 0
      net.ipv4.conf.all.send_redirects = 0
      net.ipv4.conf.default.send_redirects = 0

runcmd:
  - systemctl enable --now docker
  - systemctl enable --now fail2ban
  - mkdir -p /opt/vex-ranker/postgres /opt/vex-ranker/backups /opt/vex-ranker/caddy/data /opt/vex-ranker/caddy/config
  - chown -R ubuntu:ubuntu /opt/vex-ranker
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - sysctl --system
